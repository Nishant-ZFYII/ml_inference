<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <!-- MathJax 3 for kramdown $$...$$ and $...$ math -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <!-- Mermaid 10 (global init for all <div class="mermaid"> blocks across the site) -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      theme: 'neutral',
      themeVariables: {
        fontSize: '20px',
        primaryColor: '#ffffff',
        primaryTextColor: '#000000',
        primaryBorderColor: '#999999',
        lineColor: '#666666'
      },
      flowchart: {
        htmlLabels: true,
        curve: 'basis',
        padding: 24,
        nodeSpacing: 70,
        rankSpacing: 90,
        useMaxWidth: false
      },
      securityLevel: 'loose'
    });
  </script>

  <!-- Diagram + math display fixes -->
  <style>
    /* Allow Mermaid / SVG diagrams to render at natural size with horizontal scroll
       instead of being squished into the minima content column. */
    .mermaid {
      overflow-x: auto;
      text-align: center;
      margin: 1.5em 0;
      font-size: 20px;
    }
    .mermaid svg {
      max-width: none !important;
      min-width: 1000px;
      height: auto;
    }
    .mermaid svg .nodeLabel,
    .mermaid svg .edgeLabel {
      font-size: 18px !important;
    }
    /* Same treatment for embedded SVGs and PNGs in the diagrams directory. */
    img[src*="/assets/diagrams/"] {
      display: block;
      margin: 1.5em auto;
      max-width: 100%;
      height: auto;
    }
    /* Tighter spacing around display equations. */
    mjx-container[display="true"] {
      margin: 1em 0 !important;
    }
    /* Wider content column for technical pages with tables. */
    .page-content .wrapper, .post-content .wrapper {
      max-width: 1200px;
    }
  </style>
</head>
