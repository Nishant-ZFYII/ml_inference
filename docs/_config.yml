title: "Bootstrap Perception"
description: "Monocular depth distillation for indoor robot navigation under hardware depth failure — training pipeline, evaluation, and deployment."
author: "Nishant Pushparaju, Vivek Mattam"
baseurl: "/ml_inference"
url: "https://nishant-zfyii.github.io"

theme: minima

markdown: kramdown
highlighter: rouge

kramdown:
  math_engine: mathjax

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Top nav (minima reads `header_pages` for the site header)
header_pages:
  - index.md
  - architecture.md
  - hardware.md
  - models.md
  - concepts.md
  - training.md
  - evaluation.md
  - calibration.md
  - deployment.md
  - decisions.md
  - datasets.md
  - videos.md
  - docker.md

# Per-section ordering (used by minima sidebar / index lookups)
collections:
  models:
    output: true
    permalink: /:collection/:name
  concepts:
    output: true
    permalink: /:collection/:name
